version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: craftybase
    main: ./cmd/craftybase
    binary: craftybase
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.buildDate={{.Date}}

archives:
  - format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "craftybase_{{.Version}}_{{.Os}}_{{.Arch}}"
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "craftybase_{{.Version}}_checksums.txt"
  algorithm: sha256

brews:
  - name: craftybase
    repository:
      owner: craftybase
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://craftybase.com"
    description: "Official CLI for the Craftybase Public API"
    install: |
      bin.install "craftybase"
    test: |
      system "#{bin}/craftybase version"

release:
  github:
    owner: craftybase
    name: craftybase-cli
